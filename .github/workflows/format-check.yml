name: Format Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Check format
        run: npm run format
